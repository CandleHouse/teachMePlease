<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="ui-sans-serif, system-ui, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1000" height="720" fill="#f8fafc"/>

  <!-- 标题 -->
  <text x="500" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">卷积运算：一个 3×3 核如何在图上滑动</text>
  <text x="500" y="58" text-anchor="middle" font-size="12" fill="#64748b">每滑到一个位置，核盖住的 9 个像素与核权重逐个相乘再求和 → 得到输出的 1 个像素</text>

  <!-- ═══════════ 左：输入图 + 核 + 乘法 ═══════════ -->
  <!-- 输入图 5x5 -->
  <g transform="translate(50,110)">
    <text x="90" y="-14" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">输入图（5×5 像素）</text>
    <text x="90" y="178" text-anchor="middle" font-size="10" fill="#64748b">部分像素值示例</text>
    <!-- 5x5 grid, cell 30px -->
    <g font-size="11" text-anchor="middle" dominant-baseline="central">
      <!-- row0 -->
      <rect x="0"   y="0" width="30" height="30" fill="#dbeafe" stroke="#94a3b8"/><text x="15" y="16">1</text>
      <rect x="30"  y="0" width="30" height="30" fill="#bfdbfe" stroke="#94a3b8"/><text x="45" y="16">2</text>
      <rect x="60"  y="0" width="30" height="30" fill="#93c5fd" stroke="#94a3b8"/><text x="75" y="16">3</text>
      <rect x="90"  y="0" width="30" height="30" fill="#bfdbfe" stroke="#94a3b8"/><text x="105" y="16">2</text>
      <rect x="120" y="0" width="30" height="30" fill="#dbeafe" stroke="#94a3b8"/><text x="135" y="16">1</text>
      <!-- row1 -->
      <rect x="0"   y="30" width="30" height="30" fill="#bfdbfe" stroke="#94a3b8"/><text x="15" y="46">2</text>
      <rect x="30"  y="30" width="30" height="30" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/><text x="45" y="46" fill="#fff" font-weight="700">5</text>
      <rect x="60"  y="30" width="30" height="30" fill="#1d4ed8" stroke="#1e3a8a" stroke-width="2"/><text x="75" y="46" fill="#fff" font-weight="700">8</text>
      <rect x="90"  y="30" width="30" height="30" fill="#60a5fa" stroke="#94a3b8"/><text x="105" y="46">4</text>
      <rect x="120" y="30" width="30" height="30" fill="#bfdbfe" stroke="#94a3b8"/><text x="135" y="46">2</text>
      <!-- row2 -->
      <rect x="0"   y="60" width="30" height="30" fill="#93c5fd" stroke="#94a3b8"/><text x="15" y="76">3</text>
      <rect x="30"  y="60" width="30" height="30" fill="#2563eb" stroke="#1e40af" stroke-width="2"/><text x="45" y="76" fill="#fff" font-weight="700">7</text>
      <rect x="60"  y="60" width="30" height="30" fill="#1e40af" stroke="#1e3a8a" stroke-width="2"/><text x="75" y="76" fill="#fff" font-weight="700">9</text>
      <rect x="90"  y="60" width="30" height="30" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/><text x="105" y="76" fill="#fff" font-weight="700">6</text>
      <rect x="120" y="60" width="30" height="30" fill="#93c5fd" stroke="#94a3b8"/><text x="135" y="76">3</text>
      <!-- row3 -->
      <rect x="0"   y="90" width="30" height="30" fill="#bfdbfe" stroke="#94a3b8"/><text x="15" y="106">2</text>
      <rect x="30"  y="90" width="30" height="30" fill="#60a5fa" stroke="#94a3b8"/><text x="45" y="106">4</text>
      <rect x="60"  y="90" width="30" height="30" fill="#3b82f6" stroke="#94a3b8"/><text x="75" y="106">6</text>
      <rect x="90"  y="90" width="30" height="30" fill="#60a5fa" stroke="#94a3b8"/><text x="105" y="106">4</text>
      <rect x="120" y="90" width="30" height="30" fill="#bfdbfe" stroke="#94a3b8"/><text x="135" y="106">2</text>
      <!-- row4 -->
      <rect x="0"   y="120" width="30" height="30" fill="#dbeafe" stroke="#94a3b8"/><text x="15" y="136">1</text>
      <rect x="30"  y="120" width="30" height="30" fill="#bfdbfe" stroke="#94a3b8"/><text x="45" y="136">2</text>
      <rect x="60"  y="120" width="30" height="30" fill="#93c5fd" stroke="#94a3b8"/><text x="75" y="136">3</text>
      <rect x="90"  y="120" width="30" height="30" fill="#bfdbfe" stroke="#94a3b8"/><text x="105" y="136">2</text>
      <rect x="120" y="120" width="30" height="30" fill="#dbeafe" stroke="#94a3b8"/><text x="135" y="136">1</text>
    </g>
    <!-- 高亮当前覆盖的 3x3 窗口（左上角，位置0） -->
    <rect x="0" y="0" width="90" height="90" fill="none" stroke="#dc2626" stroke-width="3" rx="2"/>
    <text x="45" y="-4" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">当前窗口 3×3</text>
  </g>

  <!-- 乘号 -->
  <text x="245" y="200" text-anchor="middle" font-size="26" font-weight="700" fill="#475569">×</text>

  <!-- 卷积核 3x3 -->
  <g transform="translate(275,140)">
    <text x="45" y="-14" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">卷积核 kernel（3×3 权重）</text>
    <g font-size="11" text-anchor="middle" dominant-baseline="central">
      <rect x="0"  y="0" width="30" height="30" fill="#fef3c7" stroke="#d97706"/><text x="15" y="16" font-weight="700">1</text>
      <rect x="30" y="0" width="30" height="30" fill="#fde68a" stroke="#d97706"/><text x="45" y="16" font-weight="700">2</text>
      <rect x="60" y="0" width="30" height="30" fill="#fef3c7" stroke="#d97706"/><text x="75" y="16" font-weight="700">1</text>
      <rect x="0"  y="30" width="30" height="30" fill="#fde68a" stroke="#d97706"/><text x="15" y="46" font-weight="700">2</text>
      <rect x="30" y="30" width="30" height="30" fill="#fbbf24" stroke="#b45309"/><text x="45" y="46" font-weight="700">4</text>
      <rect x="60" y="30" width="30" height="30" fill="#fde68a" stroke="#d97706"/><text x="75" y="46" font-weight="700">2</text>
      <rect x="0"  y="60" width="30" height="30" fill="#fef3c7" stroke="#d97706"/><text x="15" y="76" font-weight="700">1</text>
      <rect x="30" y="60" width="30" height="30" fill="#fde68a" stroke="#d97706"/><text x="45" y="76" font-weight="700">2</text>
      <rect x="60" y="60" width="30" height="30" fill="#fef3c7" stroke="#d97706"/><text x="75" y="76" font-weight="700">1</text>
    </g>
    <text x="45" y="118" text-anchor="middle" font-size="10" fill="#64748b">中心权重大 → 强化中心像素</text>
  </g>

  <!-- 等号 -->
  <text x="425" y="200" text-anchor="middle" font-size="26" font-weight="700" fill="#475569">=</text>

  <!-- 计算过程 -->
  <g transform="translate(460,120)">
    <text x="110" y="-10" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">逐元素相乘后求和</text>
    <rect x="0" y="0" width="220" height="130" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
    <text x="110" y="26" text-anchor="middle" font-size="11" fill="#7c2d12">1×1 + 2×2 + 3×1</text>
    <text x="110" y="44" text-anchor="middle" font-size="11" fill="#7c2d12">+ 2×2 + 5×4 + 8×2</text>
    <text x="110" y="62" text-anchor="middle" font-size="11" fill="#7c2d12">+ 3×1 + 7×2 + 9×1</text>
    <line x1="30" y1="74" x2="190" y2="74" stroke="#d97706" stroke-width="1"/>
    <text x="110" y="94" text-anchor="middle" font-size="12" fill="#7c2d12">= 1+4+3+4+20+16+3+14+9</text>
    <text x="110" y="114" text-anchor="middle" font-size="16" font-weight="700" fill="#b45309">= 74</text>
  </g>

  <!-- 箭头到输出 -->
  <line x1="690" y1="185" x2="725" y2="185" stroke="#dc2626" stroke-width="2" marker-end="url(#arrR)"/>

  <!-- 输出图 3x3 -->
  <g transform="translate(735,120)">
    <text x="60" y="-10" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">输出响应图（3×3）</text>
    <g font-size="13" text-anchor="middle" dominant-baseline="central">
      <rect x="0"  y="0" width="40" height="40" fill="#fecaca" stroke="#dc2626" stroke-width="2.5"/><text x="20" y="21" font-weight="700" fill="#7f1d1d">74</text>
      <rect x="40" y="0" width="40" height="40" fill="#fee2e2" stroke="#94a3b8"/><text x="60" y="21">52</text>
      <rect x="80" y="0" width="40" height="40" fill="#fee2e2" stroke="#94a3b8"/><text x="100" y="21">31</text>
      <rect x="0"  y="40" width="40" height="40" fill="#fee2e2" stroke="#94a3b8"/><text x="20" y="61">48</text>
      <rect x="40" y="40" width="40" height="40" fill="#fee2e2" stroke="#94a3b8"/><text x="60" y="61">36</text>
      <rect x="80" y="40" width="40" height="40" fill="#fee2e2" stroke="#94a3b8"/><text x="100" y="61">22</text>
      <rect x="0"  y="80" width="40" height="40" fill="#fee2e2" stroke="#94a3b8"/><text x="20" y="101">25</text>
      <rect x="40" y="80" width="40" height="40" fill="#fee2e2" stroke="#94a3b8"/><text x="60" y="101">19</text>
      <rect x="80" y="80" width="40" height="40" fill="#fee2e2" stroke="#94a3b8"/><text x="100" y="101">12</text>
    </g>
    <text x="60" y="142" text-anchor="middle" font-size="10" fill="#64748b">第一个输出 = 当前窗口的卷积结果</text>
  </g>

  <!-- ═══════════ 下半：滑动过程示意 ═══════════ -->
  <line x1="50" y1="320" x2="950" y2="320" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="500" y="345" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">滑动过程：核从左上角扫到右下角，每停一次产出一个值</text>

  <!-- 三个迷你状态：位置1, 位置2(中央), 位置3(右下) -->
  <!-- 状态A：左上 -->
  <g transform="translate(90,375)">
    <text x="75" y="-8" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">第 1 步：左上角</text>
    <g font-size="9" text-anchor="middle" dominant-baseline="central">
      <rect x="0"   y="0" width="24" height="24" fill="#dbeafe" stroke="#cbd5e1"/><text x="12" y="13">1</text>
      <rect x="24"  y="0" width="24" height="24" fill="#3b82f6" stroke="#1e40af"/><text x="36" y="13" fill="#fff">5</text>
      <rect x="48"  y="0" width="24" height="24" fill="#dbeafe" stroke="#cbd5e1"/><text x="60" y="13">2</text>
      <rect x="0"   y="24" width="24" height="24" fill="#3b82f6" stroke="#1e40af"/><text x="12" y="37" fill="#fff">5</text>
      <rect x="24"  y="24" width="24" height="24" fill="#1e3a8a" stroke="#1e3a8a"/><text x="36" y="37" fill="#fff">9</text>
      <rect x="48"  y="24" width="24" height="24" fill="#3b82f6" stroke="#1e40af"/><text x="60" y="37" fill="#fff">6</text>
      <rect x="0"   y="48" width="24" height="24" fill="#dbeafe" stroke="#cbd5e1"/><text x="12" y="61">2</text>
      <rect x="24"  y="48" width="24" height="24" fill="#3b82f6" stroke="#1e40af"/><text x="36" y="61" fill="#fff">6</text>
      <rect x="48"  y="48" width="24" height="24" fill="#dbeafe" stroke="#cbd5e1"/><text x="60" y="61">3</text>
    </g>
    <rect x="0" y="0" width="72" height="72" fill="none" stroke="#dc2626" stroke-width="2.5" rx="2"/>
    <text x="36" y="92" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">→ 74</text>
  </g>

  <!-- 箭头 -->
  <line x1="245" y1="411" x2="285" y2="411" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 状态B：中间 -->
  <g transform="translate(300,375)">
    <text x="75" y="-8" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">第 2 步：右移一格</text>
    <g font-size="9" text-anchor="middle" dominant-baseline="central">
      <rect x="0"   y="0" width="24" height="24" fill="#dbeafe" stroke="#cbd5e1"/><text x="12" y="13">1</text>
      <rect x="24"  y="0" width="24" height="24" fill="#dbeafe" stroke="#cbd5e1"/><text x="36" y="13">2</text>
      <rect x="48"  y="0" width="24" height="24" fill="#3b82f6" stroke="#1e40af"/><text x="60" y="13" fill="#fff">5</text>
      <rect x="0"   y="24" width="24" height="24" fill="#dbeafe" stroke="#cbd5e1"/><text x="12" y="37">2</text>
      <rect x="24"  y="24" width="24" height="24" fill="#dbeafe" stroke="#cbd5e1"/><text x="36" y="37">5</text>
      <rect x="48"  y="24" width="24" height="24" fill="#1e3a8a" stroke="#1e3a8a"/><text x="60" y="37" fill="#fff">9</text>
      <rect x="0"   y="48" width="24" height="24" fill="#dbeafe" stroke="#cbd5e1"/><text x="12" y="61">3</text>
      <rect x="24"  y="48" width="24" height="24" fill="#dbeafe" stroke="#cbd5e1"/><text x="36" y="61">7</text>
      <rect x="48"  y="48" width="24" height="24" fill="#1e3a8a" stroke="#1e3a8a"/><text x="60" y="61" fill="#fff">9</text>
    </g>
    <rect x="24" y="0" width="72" height="72" fill="none" stroke="#dc2626" stroke-width="2.5" rx="2"/>
    <text x="36" y="92" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">→ 52</text>
  </g>

  <line x1="455" y1="411" x2="495" y2="411" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <text x="475" y="404" text-anchor="middle" font-size="9" fill="#64748b">…</text>

  <!-- 状态C：右下 -->
  <g transform="translate(510,375)">
    <text x="75" y="-8" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">第 9 步：右下角</text>
    <g font-size="9" text-anchor="middle" dominant-baseline="central">
      <rect x="0"   y="0" width="24" height="24" fill="#dbeafe" stroke="#cbd5e1"/><text x="12" y="13">3</text>
      <rect x="24"  y="0" width="24" height="24" fill="#dbeafe" stroke="#cbd5e1"/><text x="36" y="13">6</text>
      <rect x="48"  y="0" width="24" height="24" fill="#dbeafe" stroke="#cbd5e1"/><text x="60" y="13">4</text>
      <rect x="0"   y="24" width="24" height="24" fill="#dbeafe" stroke="#cbd5e1"/><text x="12" y="37">6</text>
      <rect x="24"  y="24" width="24" height="24" fill="#dbeafe" stroke="#cbd5e1"/><text x="36" y="37">4</text>
      <rect x="48"  y="24" width="24" height="24" fill="#3b82f6" stroke="#1e40af"/><text x="60" y="37" fill="#fff">2</text>
      <rect x="0"   y="48" width="24" height="24" fill="#dbeafe" stroke="#cbd5e1"/><text x="12" y="61">3</text>
      <rect x="24"  y="48" width="24" height="24" fill="#3b82f6" stroke="#1e40af"/><text x="36" y="61" fill="#fff">2</text>
      <rect x="48"  y="48" width="24" height="24" fill="#dbeafe" stroke="#cbd5e1"/><text x="60" y="61">1</text>
    </g>
    <rect x="24" y="24" width="72" height="72" fill="none" stroke="#dc2626" stroke-width="2.5" rx="2"/>
    <text x="36" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">→ 12</text>
  </g>

  <!-- 要点说明框 -->
  <g transform="translate(640,370)">
    <rect x="0" y="0" width="300" height="140" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="1.5"/>
    <text x="15" y="24" font-size="12" font-weight="700" fill="#075985">三个关键性质</text>
    <text x="15" y="46" font-size="11" fill="#0c4a6e">① <tspan font-weight="600">权值共享</tspan>：同一个核在所有位置复用</text>
    <text x="15" y="64" font-size="11" fill="#0c4a6e">    → 参数极少，且处处通用</text>
    <text x="15" y="86" font-size="11" fill="#0c4a6e">② <tspan font-weight="600">局部连接</tspan>：每次只看 3×3 邻域</text>
    <text x="15" y="104" font-size="11" fill="#0c4a6e">    → 学到边缘/纹理等局部模式</text>
    <text x="15" y="126" font-size="11" fill="#0c4a6e">③ <tspan font-weight="600">平移等变</tspan>：手挪位，响应跟着挪</text>
  </g>

  <!-- 底部直觉 -->
  <g transform="translate(50,610)">
    <rect x="0" y="0" width="900" height="80" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="15" y="26" font-size="12" font-weight="700" fill="#713f12">直觉：核就是一个小小的"模式探测器"</text>
    <text x="15" y="48" font-size="11" fill="#854d0e">图里数值大的地方（深蓝，代表"亮度高/特征强"），与"中心权重大"的核相乘后，输出也大——说明这个位置"很像核所代表的模式"。</text>
    <text x="15" y="66" font-size="11" fill="#854d0e">本图中央数值最高（9），所以输出响应图的左上角（74）最大——卷积就是用这种方式"定位"特征出现的位置。</text>
  </g>
</svg>
